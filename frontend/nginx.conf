# CMS 前端 Nginx 配置
# 简化版本，只保留核心功能

# 上游服务器配置
upstream cms_backend {
    server 43.133.91.197:5000;
}

# 主服务器配置
server {
    listen 8031;
    server_name 8.159.128.180;
    
    # 根目录
    root /var/www/dist;
    index index.html;
    
    # API请求转发到后端
    location /api/ {
        proxy_pass http://cms_backend;
        proxy_set_header Host 43.133.91.197:5000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # 上传文件请求转发
    location /uploads/ {
        proxy_pass http://cms_backend;
        proxy_set_header Host 43.133.91.197:5000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # 管理后台路由
    location /admin {
        try_files $uri $uri/ /index.html;
    }
    
    # 密码设置页面
    location /password {
        try_files $uri $uri/ /index.html;
    }
    
    # 文章详情页面
    location ~ ^/article/ {
        try_files $uri $uri/ /index.html;
    }
    
    # 首页和通用路由
    location / {
        try_files $uri $uri/ /index.html;
    }
}