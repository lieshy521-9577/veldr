<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoteFlow — 笔记管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ===== Design Tokens ===== */
:root {
  --c50:#fafaf9; --c100:#f5f5f4; --c200:#e7e5e4; --c300:#d6d3d1;
  --c400:#a8a29e; --c500:#78716c; --c600:#57534e; --c700:#44403c;
  --c800:#292524; --c900:#1c1917;
  --a50:#f0fdf5; --a100:#dcfce7; --a200:#bbf7d0; --a300:#86efac;
  --a400:#4ade80; --a500:#22c55e; --a600:#16a34a; --a700:#15803d;
  --a800:#166534; --a900:#14532d;
  --warn:#f59e0b; --err:#ef4444; --info:#3b82f6;
  --font-sans:'Geist',system-ui,-apple-system,sans-serif;
  --font-mono:'Geist Mono','JetBrains Mono',monospace;
  --topnav-h:60px; --sidebar-w:264px; --toc-w:220px;
  --s1:.25rem; --s2:.5rem; --s3:.75rem; --s4:1rem; --s5:1.25rem;
  --s6:1.5rem; --s8:2rem; --s10:2.5rem; --s12:3rem; --s16:4rem;
  --shadow-sm:0 1px 2px rgb(0 0 0/.04);
  --shadow-md:0 4px 6px -1px rgb(0 0 0/.06);
  --ease:cubic-bezier(.16,1,.3,1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:var(--font-sans);color:var(--c800);background:var(--c50);line-height:1.6;overflow:hidden;height:100vh}

/* ===== Top Nav ===== */
.topnav{
  position:fixed;top:0;left:0;right:0;height:var(--topnav-h);
  background:rgba(250,250,249,.88);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--c200);z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 var(--s8);
}
.topnav__brand{
  display:flex;align-items:center;gap:var(--s3);
  text-decoration:none;color:var(--c900);cursor:pointer;
}
.topnav__logo{
  width:30px;height:30px;
  background:linear-gradient(135deg,var(--a500),var(--a700));
  border-radius:7px;display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:600;font-size:13px;
}
.topnav__title{font-size:1.0625rem;font-weight:600;letter-spacing:-.02em}
.topnav__menu{display:flex;align-items:center;gap:var(--s1);flex-wrap:nowrap}
.topnav__link{
  padding:var(--s2) var(--s4);font-size:.875rem;font-weight:500;
  color:var(--c600);text-decoration:none;border-radius:6px;
  transition:all .15s var(--ease);cursor:pointer;white-space:nowrap;
  position:relative;
}
.topnav__link:hover{color:var(--c900);background:var(--c100)}
.topnav__link--active{color:var(--c900);background:var(--c100)}
.topnav__link--editing{padding:var(--s2) var(--s2);background:var(--c100);border-radius:6px}
.topnav__link-input{
  width:80px;padding:2px var(--s2);font-size:.875rem;font-family:var(--font-sans);
  border:1px solid var(--a500);border-radius:4px;outline:none;
  background:#fff;color:var(--c900);
}
.topnav__link-delete{
  position:absolute;top:-6px;right:-6px;width:18px;height:18px;
  background:var(--err);color:#fff;border:none;border-radius:50%;
  font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center;
  line-height:1;
}
.topnav__link:hover .topnav__link-delete{display:flex}
.topnav__add-menu{
  padding:var(--s2) var(--s3);font-size:.875rem;color:var(--a600);
  background:none;border:1px dashed var(--c300);border-radius:6px;
  cursor:pointer;transition:all .15s var(--ease);
}
.topnav__add-menu:hover{border-color:var(--a500);background:var(--a50)}
.topnav__actions{display:flex;align-items:center;gap:var(--s3)}
.topnav__search{position:relative}
.topnav__search-input{
  width:220px;padding:var(--s2) var(--s3) var(--s2) var(--s8);
  font-size:.875rem;font-family:var(--font-sans);color:var(--c800);
  background:var(--c100);border:1px solid var(--c200);border-radius:7px;
  outline:none;transition:all .15s var(--ease);
}
.topnav__search-input:focus{background:#fff;border-color:var(--a500);box-shadow:0 0 0 3px rgb(34 197 94/.12)}
.topnav__search-input::placeholder{color:var(--c400)}
.topnav__search-icon{
  position:absolute;left:var(--s3);top:50%;transform:translateY(-50%);
  width:16px;height:16px;color:var(--c400);pointer-events:none;
}
.topnav__btn{
  padding:var(--s2) var(--s5);font-size:.875rem;font-weight:500;
  font-family:var(--font-sans);color:#fff;background:var(--a600);
  border:none;border-radius:7px;cursor:pointer;
  transition:all .15s var(--ease);white-space:nowrap;
}
.topnav__btn:hover{background:var(--a700);transform:translateY(-1px);box-shadow:var(--shadow-md)}

/* ===== Layout ===== */
.layout{display:flex;margin-top:var(--topnav-h);height:calc(100vh - var(--topnav-h))}

/* ===== Sidebar ===== */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:#fff;border-right:1px solid var(--c200);
  overflow-y:auto;overflow-x:hidden;padding:var(--s6) 0;
}
.sidebar::-webkit-scrollbar{width:5px}
.sidebar::-webkit-scrollbar-thumb{background:var(--c300);border-radius:3px}
.sidebar__section{margin-bottom:var(--s6)}
.sidebar__label{
  padding:var(--s2) var(--s6);font-size:.75rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.05em;color:var(--c400);
}
.sidebar__item{
  display:flex;align-items:center;gap:var(--s3);
  padding:var(--s2) var(--s6);font-size:.875rem;color:var(--c600);
  text-decoration:none;cursor:pointer;border-right:2px solid transparent;
  transition:all .15s var(--ease);
}
.sidebar__item:hover{color:var(--c900);background:var(--c50)}
.sidebar__item--active{color:var(--a700);background:var(--a50);border-right-color:var(--a500);font-weight:500}
.sidebar__icon{width:17px;height:17px;flex-shrink:0}
.sidebar__count{
  margin-left:auto;padding:0 var(--s2);font-size:.75rem;font-weight:500;
  color:var(--c400);background:var(--c100);border-radius:999px;
}
.sidebar__item--active .sidebar__count{color:var(--a600);background:var(--a100)}
.sidebar__divider{height:1px;background:var(--c200);margin:var(--s4) var(--s6)}

/* ===== Main ===== */
.main{flex:1;overflow-y:auto;padding:var(--s10) var(--s12)}
.main::-webkit-scrollbar{width:7px}
.main::-webkit-scrollbar-thumb{background:var(--c300);border-radius:4px}

/* ===== View: Browse ===== */
.content-header{margin-bottom:var(--s8)}
.content-header__breadcrumb{
  display:flex;align-items:center;gap:var(--s2);margin-bottom:var(--s3);
  font-size:.875rem;color:var(--c400);
}
.content-header__breadcrumb a{color:var(--c500);text-decoration:none;cursor:pointer;transition:color .15s var(--ease)}
.content-header__breadcrumb a:hover{color:var(--a600)}
.content-header__title{font-size:1.875rem;font-weight:700;letter-spacing:-.03em;color:var(--c900);line-height:1.2}
.content-header__desc{margin-top:var(--s3);font-size:1rem;color:var(--c500);max-width:620px;line-height:1.7}
.stats-bar{display:flex;gap:var(--s4);margin-bottom:var(--s6);flex-wrap:wrap}
.stat-pill{
  padding:var(--s2) var(--s4);font-size:.8125rem;font-weight:500;
  border-radius:999px;background:var(--c100);color:var(--c600);
  display:flex;align-items:center;gap:var(--s2);
}
.stat-pill strong{color:var(--c900)}
.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:var(--s5)}
.note-card{
  background:#fff;border:1px solid var(--c200);border-radius:11px;
  padding:var(--s5);cursor:pointer;transition:all .25s var(--ease);
  display:block;position:relative;
}
.note-card:hover{border-color:var(--c300);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.note-card__header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:var(--s3)}
.note-card__icon{
  width:36px;height:36px;background:var(--a50);border-radius:9px;
  display:flex;align-items:center;justify-content:center;color:var(--a600);
}
.note-card__actions{display:flex;gap:4px}
.note-card__action-btn{
  width:28px;height:28px;background:transparent;border:1px solid var(--c200);
  border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--c400);transition:all .15s var(--ease);font-size:14px;
}
.note-card__action-btn:hover{background:var(--c100);color:var(--c700);border-color:var(--c300)}
.note-card__action-btn--delete:hover{background:#fef2f2;color:var(--err);border-color:#fecaca}
.note-card__tag{
  padding:2px var(--s2);font-size:.75rem;font-weight:500;
  color:var(--a700);background:var(--a50);border-radius:4px;
}
.note-card__title{font-size:1.0625rem;font-weight:600;color:var(--c900);margin-bottom:var(--s2);line-height:1.4}
.note-card__excerpt{
  font-size:.875rem;color:var(--c500);line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.note-card__footer{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:var(--s4);padding-top:var(--s4);border-top:1px solid var(--c100);
  font-size:.8125rem;color:var(--c400);
}
.note-card__date{display:flex;align-items:center;gap:4px}

/* ===== View: Detail ===== */
.detail-view{display:none}
.detail-view--active{display:block}
.detail__back{
  display:inline-flex;align-items:center;gap:var(--s2);
  padding:var(--s2) var(--s3);font-size:.875rem;font-weight:500;
  color:var(--c600);background:transparent;border:1px solid var(--c200);
  border-radius:7px;cursor:pointer;margin-bottom:var(--s6);
  transition:all .15s var(--ease);
}
.detail__back:hover{background:var(--c100);color:var(--c900)}
.detail__meta{display:flex;align-items:center;gap:var(--s4);margin-bottom:var(--s4);font-size:.875rem;color:var(--c400);flex-wrap:wrap}
.detail__meta-tag{padding:2px var(--s3);font-size:.75rem;font-weight:500;color:var(--a700);background:var(--a50);border-radius:4px}
.detail__content{max-width:720px}
.detail__content h1{font-size:2rem;font-weight:700;letter-spacing:-.03em;color:var(--c900);line-height:1.2;margin-bottom:var(--s4)}
.detail__content h2{font-size:1.375rem;font-weight:600;letter-spacing:-.02em;color:var(--c900);line-height:1.3;margin-top:var(--s10);margin-bottom:var(--s4);padding-top:var(--s8);border-top:1px solid var(--c200)}
.detail__content h3{font-size:1.125rem;font-weight:600;color:var(--c900);margin-top:var(--s8);margin-bottom:var(--s3)}
.detail__content p{font-size:1rem;color:var(--c600);line-height:1.85;margin-bottom:var(--s4)}
.detail__content code{font-family:var(--font-mono);font-size:.875em;padding:.125em var(--s2);background:var(--c100);border-radius:4px;color:var(--a700)}
.detail__content pre{background:var(--c900);border-radius:11px;padding:var(--s5);margin:var(--s6) 0;overflow-x:auto}
.detail__content pre code{background:none;color:var(--a200);padding:0;font-size:.875rem;line-height:1.75}
.detail__content ul,.detail__content ol{margin:var(--s4) 0;padding-left:var(--s6)}
.detail__content li{font-size:1rem;color:var(--c600);line-height:1.85;margin-bottom:var(--s2)}
.detail__content img{max-width:100%;height:auto;border-radius:11px;margin:var(--s6) 0;display:block;box-shadow:var(--shadow-sm)}

/* ===== Page Views (API, Guide) ===== */
.page-view{display:none;max-width:720px}
.page-view--active{display:block}
.page-view__title{font-size:2rem;font-weight:700;letter-spacing:-.03em;color:var(--c900);line-height:1.2;margin-bottom:var(--s4)}
.page-view h2{font-size:1.375rem;font-weight:600;letter-spacing:-.02em;color:var(--c900);margin-top:var(--s10);margin-bottom:var(--s4);padding-top:var(--s8);border-top:1px solid var(--c200)}
.page-view h3{font-size:1.125rem;font-weight:600;color:var(--c900);margin-top:var(--s8);margin-bottom:var(--s3)}
.page-view p{font-size:1rem;color:var(--c600);line-height:1.85;margin-bottom:var(--s4)}
.page-view code{font-family:var(--font-mono);font-size:.875em;padding:.125em var(--s2);background:var(--c100);border-radius:4px;color:var(--a700)}
.page-view pre{background:var(--c900);border-radius:11px;padding:var(--s5);margin:var(--s6) 0;overflow-x:auto}
.page-view pre code{background:none;color:var(--a200);padding:0;font-size:.875rem;line-height:1.75}
.page-view ul,.page-view ol{margin:var(--s4) 0;padding-left:var(--s6)}
.page-view li{font-size:1rem;color:var(--c600);line-height:1.85;margin-bottom:var(--s2)}
.page-view img{max-width:100%;height:auto;border-radius:11px;margin:var(--s6) 0;display:block;box-shadow:var(--shadow-sm)}

/* ===== Callout ===== */
.callout{padding:var(--s4) var(--s5);border-radius:9px;margin:var(--s6) 0;border-left:3px solid}
.callout--info{background:var(--a50);border-color:var(--a500)}
.callout--warning{background:#fefce8;border-color:var(--warn)}
.callout__title{font-size:.9375rem;font-weight:600;margin-bottom:var(--s2)}
.callout--info .callout__title{color:var(--a800)}
.callout--warning .callout__title{color:#92400e}
.callout__content{font-size:.9375rem;line-height:1.7}
.callout--info .callout__content{color:var(--a700)}

/* ===== Modal ===== */
.modal-overlay{
  position:fixed;inset:0;background:rgb(0 0 0/.35);z-index:200;
  display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
.modal-overlay--active{display:flex}
.modal{
  background:#fff;border-radius:14px;width:90%;max-width:640px;max-height:85vh;
  overflow-y:auto;box-shadow:0 20px 60px rgb(0 0 0/.15);
}
.modal__header{
  padding:var(--s6) var(--s6) var(--s4);
  border-bottom:1px solid var(--c200);
  display:flex;align-items:center;justify-content:space-between;
}
.modal__title{font-size:1.25rem;font-weight:600;color:var(--c900);letter-spacing:-.02em}
.modal__close{
  width:32px;height:32px;background:var(--c100);border:none;border-radius:8px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--c500);transition:all .15s var(--ease);font-size:18px;
}
.modal__close:hover{background:var(--c200);color:var(--c900)}
.modal__body{padding:var(--s6)}
.modal__field{margin-bottom:var(--s5)}
.modal__label{display:block;font-size:.875rem;font-weight:500;color:var(--c700);margin-bottom:var(--s2)}
.modal__input,.modal__select,.modal__textarea{
  width:100%;padding:var(--s3);font-size:.9375rem;font-family:var(--font-sans);
  border:1px solid var(--c200);border-radius:8px;outline:none;
  transition:all .15s var(--ease);background:#fff;color:var(--c800);
}
.modal__input:focus,.modal__select:focus,.modal__textarea:focus{
  border-color:var(--a500);box-shadow:0 0 0 3px rgb(34 197 94/.1);
}
.modal__textarea{min-height:200px;resize:vertical;font-size:.9375rem;line-height:1.7;font-family:var(--font-sans)}
.markdown-editor{display:grid;grid-template-columns:1fr 1fr;gap:var(--s4)}
.markdown-preview{min-height:200px;max-height:420px;overflow:auto;padding:var(--s3);border:1px solid var(--c200);border-radius:8px;background:var(--c50);line-height:1.7;color:var(--c800)}
.markdown-preview:empty::before{content:'实时预览会显示在这里';color:var(--c400)}
.markdown-preview h1,.markdown-preview h2,.markdown-preview h3,.markdown-preview h4{margin:0 0 var(--s3)}
.markdown-preview p,.markdown-preview ul,.markdown-preview pre{margin:0 0 var(--s3)}
.markdown-preview pre{padding:var(--s3);overflow:auto;border-radius:6px;background:var(--c900);color:#f8fafc}
.markdown-preview img{max-width:100%;height:auto;border-radius:6px}
@media(max-width:768px){.markdown-editor{grid-template-columns:1fr}.markdown-preview{max-height:260px}}
.modal__toolbar{display:flex;gap:var(--s2);margin-bottom:var(--s3)}
.modal__tool-btn{
  display:inline-flex;align-items:center;gap:var(--s2);
  padding:var(--s2) var(--s4);font-size:.8125rem;font-weight:500;font-family:var(--font-sans);
  color:var(--c600);background:var(--c100);border:1px solid var(--c200);border-radius:7px;
  cursor:pointer;transition:all .15s var(--ease);
}
.modal__tool-btn:hover{background:var(--c200);color:var(--c900);border-color:var(--c300)}
.modal__hint{font-size:.8125rem;color:var(--c400);margin-top:var(--s1)}
.modal__footer{
  padding:var(--s4) var(--s6) var(--s6);
  display:flex;justify-content:flex-end;gap:var(--s3);
}
.btn{
  padding:var(--s3) var(--s6);font-size:.875rem;font-weight:500;
  font-family:var(--font-sans);border:none;border-radius:8px;cursor:pointer;
  transition:all .15s var(--ease);
}
.btn--secondary{background:var(--c100);color:var(--c600)}
.btn--secondary:hover{background:var(--c200);color:var(--c900)}
.btn--primary{background:var(--a600);color:#fff}
.btn--primary:hover{background:var(--a700);box-shadow:var(--shadow-md)}
.btn--danger{background:#fef2f2;color:var(--err)}
.btn--danger:hover{background:#fee2e2}

/* ===== Empty state ===== */
.empty-state{text-align:center;padding:var(--s16) var(--s4);grid-column:1/-1}
.empty-state__icon{width:64px;height:64px;margin:0 auto var(--s6);background:var(--c100);border-radius:16px;display:flex;align-items:center;justify-content:center;color:var(--c400)}
.empty-state__title{font-size:1.25rem;font-weight:600;color:var(--c700);margin-bottom:var(--s2)}
.empty-state__desc{font-size:.9375rem;color:var(--c400);margin-bottom:var(--s6)}

/* ===== TOC ===== */
.toc{width:var(--toc-w);min-width:var(--toc-w);padding:var(--s10) var(--s6);overflow-y:auto;display:none}
@media(min-width:1200px){.toc{display:block}}
.toc__title{font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--c400);margin-bottom:var(--s4)}
.toc__item{margin-bottom:2px}
.toc__link{display:block;padding:var(--s1) var(--s3);font-size:.875rem;color:var(--c500);text-decoration:none;border-radius:4px;transition:all .15s var(--ease);border-left:2px solid transparent;margin-left:-2px;cursor:pointer}
.toc__link:hover{color:var(--c900);background:var(--c50)}
.toc__link--active{color:var(--a700);border-left-color:var(--a500);background:var(--a50)}

/* ===== Toast ===== */
.toast{
  position:fixed;bottom:var(--s8);left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--c900);color:#fff;padding:var(--s3) var(--s5);border-radius:10px;
  font-size:.875rem;z-index:300;opacity:0;pointer-events:none;
  transition:all .25s var(--ease);box-shadow:0 10px 30px rgb(0 0 0/.2);
}
.toast--show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== Loading ===== */
.loading-bar{position:fixed;top:0;left:0;height:2px;background:var(--a500);z-index:500;transition:width .2s var(--ease);box-shadow:0 0 8px var(--a500)}

/* ===== Login ===== */
.login-overlay{position:fixed;inset:0;background:rgba(28,25,23,.55);backdrop-filter:blur(6px);z-index:400;display:none;align-items:center;justify-content:center}
.login-overlay--active{display:flex}
.login-card{background:#fff;border-radius:16px;width:90%;max-width:360px;padding:var(--s10) var(--s8);text-align:center;box-shadow:0 20px 60px rgb(0 0 0/.2)}
.login-card__logo{width:48px;height:48px;margin:0 auto var(--s5);background:linear-gradient(135deg,var(--a500),var(--a700));border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:20px}
.login-card__title{font-size:1.375rem;font-weight:700;color:var(--c900);letter-spacing:-.02em}
.login-card__desc{font-size:.9375rem;color:var(--c500);margin:var(--s2) 0 var(--s6)}
.login-card__field{margin-bottom:var(--s5)}
.login-card__input{width:100%;padding:var(--s3) var(--s4);font-size:1rem;font-family:var(--font-sans);border:1px solid var(--c200);border-radius:9px;outline:none;transition:all .15s var(--ease);background:#fff;color:var(--c800);text-align:center}
.login-card__input:focus{border-color:var(--a500);box-shadow:0 0 0 3px rgb(34 197 94/.12)}
.login-card__btn{width:100%;padding:var(--s3);font-size:.9375rem;font-weight:500;font-family:var(--font-sans);color:#fff;background:var(--a600);border:none;border-radius:9px;cursor:pointer;transition:all .15s var(--ease)}
.login-card__btn:hover{background:var(--a700)}
.login-card__hint{font-size:.75rem;color:var(--c400);margin-top:var(--s5);line-height:1.6}
.topnav__role{font-size:.75rem;font-weight:500;padding:var(--s1) var(--s3);border-radius:999px;white-space:nowrap}
.topnav__role--editor{color:var(--a700);background:var(--a50)}
.topnav__role--viewer{color:var(--info);background:#eff6ff}
.topnav__logout{padding:var(--s2) var(--s4);font-size:.8125rem;font-weight:500;font-family:var(--font-sans);color:var(--c600);background:var(--c100);border:1px solid var(--c200);border-radius:7px;cursor:pointer;transition:all .15s var(--ease)}
.topnav__logout:hover{background:var(--c200);color:var(--c900)}

/* ===== Responsive ===== */
@media(max-width:768px){
  .sidebar{position:fixed;left:-264px;top:var(--topnav-h);height:calc(100vh - var(--topnav-h));z-index:50;transition:left .25s var(--ease)}
  .sidebar--open{left:0}
  .main{padding:var(--s6)}
  .notes-grid{grid-template-columns:1fr}
  .topnav__search-input{width:140px}
  .modal{max-width:95vw;max-height:90vh}
  .page-view{max-width:100%}
}
.overlay{position:fixed;inset:0;background:rgb(0 0 0/.2);z-index:49;display:none}
.overlay--active{display:block}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
</style>
</head>
<body>

<!-- Top Navigation -->
<nav class="topnav" role="navigation" aria-label="主导航">
  <a class="topnav__brand" onclick="App.navTo('docs')">
    <div class="topnav__logo">N</div>
    <span class="topnav__title">NoteFlow</span>
  </a>
  <div class="topnav__menu" id="topMenu">
    <!-- Dynamically rendered -->
  </div>
  <div class="topnav__actions">
    <div class="topnav__search">
      <svg class="topnav__search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" class="topnav__search-input" id="searchInput" placeholder="搜索笔记..." oninput="App.filter()">
    </div>
    <span class="topnav__role" id="roleBadge" style="display:none"></span>
    <button class="topnav__btn" id="newNoteBtn" style="display:none" onclick="App.openNoteModal()">+ 新建笔记</button>
    <button class="topnav__logout" id="logoutBtn" style="display:none" onclick="App.logout()" title="输入编辑密码">编辑登录</button>
  </div>
</nav>

<div class="overlay" id="sidebarOverlay" onclick="App.toggleSidebar()"></div>

<!-- Layout -->
<div class="layout">
  <aside class="sidebar" id="sidebar" role="navigation" aria-label="侧边栏">
    <div class="sidebar__section">
      <div class="sidebar__label">笔记本</div>
      <a class="sidebar__item sidebar__item--active" data-filter="all" onclick="App.setFilter('all',this)">
        <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        所有笔记 <span class="sidebar__count" id="countAll">0</span>
      </a>
      <a class="sidebar__item" data-filter="work" onclick="App.setFilter('work',this)">
        <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        工作知识 <span class="sidebar__count" id="countWork">0</span>
      </a>
      <a class="sidebar__item" data-filter="learn" onclick="App.setFilter('learn',this)">
        <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        学习资料 <span class="sidebar__count" id="countLearn">0</span>
      </a>
      <a class="sidebar__item" data-filter="star" onclick="App.setFilter('star',this)">
        <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        收藏夹 <span class="sidebar__count" id="countStar">0</span>
      </a>
    </div>
    <div class="sidebar__divider"></div>
    <div class="sidebar__section">
      <div class="sidebar__label">标签</div>
      <div id="tagsList"></div>
    </div>
  </aside>

  <main class="main" role="main" id="mainContent">
    <div id="browseView"></div>
    <div class="detail-view" id="detailView"></div>
    <div class="page-view" id="pageView"></div>
  </main>

  <nav class="toc" id="tocNav">
    <div class="toc__title">快捷操作</div>
    <div style="padding:0 var(--s3);font-size:.875rem;color:var(--c500);line-height:2.2">
      <div style="margin-bottom:8px;padding:8px 12px;background:var(--c100);border-radius:6px">
        <strong>Ctrl+K</strong> — 搜索笔记<br>
        <strong>Esc</strong> — 返回列表 / 关闭弹窗<br>
        <strong>双击菜单项</strong> — 编辑菜单<br>
        <strong>右键菜单项</strong> — 删除菜单
      </div>
    </div>
  </nav>
</div>

<!-- New/Edit Note Modal -->
<div class="modal-overlay" id="noteModal">
  <div class="modal">
    <div class="modal__header">
      <h3 class="modal__title" id="modalTitle">新建笔记</h3>
      <button class="modal__close" onclick="App.closeModal()">✕</button>
    </div>
    <div class="modal__body">
      <div class="modal__field">
        <label class="modal__label">标题</label>
        <input class="modal__input" id="noteTitle" placeholder="输入笔记标题...">
      </div>
      <div style="display:flex;gap:var(--s5)">
        <div class="modal__field" style="flex:1">
          <label class="modal__label">分类</label>
          <select class="modal__select" id="noteCategory">
            <option value="work">工作</option>
            <option value="learn">学习</option>
          </select>
        </div>
        <div class="modal__field" style="flex:1">
          <label class="modal__label">标签（逗号分隔）</label>
          <input class="modal__input" id="noteTags" placeholder="例如: frontend, react">
        </div>
      </div>
      <div class="modal__field">
        <label class="modal__label">内容（支持 Markdown）</label>
        <div class="modal__toolbar">
          <button type="button" class="modal__tool-btn" onclick="App.uploadImage()" title="上传并插入图片（单张 ≤ 5MB）">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            插入图片
          </button>
          <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="App.handleImageSelected(event)">
        </div>
        <div class="markdown-editor">
          <textarea class="modal__textarea" id="noteContent" oninput="App.updateMarkdownPreview()" placeholder="在此编写笔记内容...&#10;&#10;支持 Markdown 格式：&#10;# 一级标题&#10;## 二级标题&#10;**粗体** *斜体*&#10;- 列表项&#10;```代码块```"></textarea>
          <div class="markdown-preview" id="markdownPreview" aria-live="polite"></div>
        </div>
        <div class="modal__hint">💡 支持 Markdown 语法：标题、粗体、斜体、列表、代码块、表格、图片</div>
      </div>
    </div>
    <div class="modal__footer">
      <button class="btn btn--danger" id="modalDeleteBtn" style="display:none;margin-right:auto" onclick="App.deleteNote()">删除笔记</button>
      <button class="btn btn--secondary" onclick="App.closeModal()">取消</button>
      <button class="btn btn--primary" id="modalSaveBtn" onclick="App.saveNote()">保存笔记</button>
    </div>
  </div>
</div>

<!-- Login -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <div class="login-card__logo">N</div>
    <h2 class="login-card__title">NoteFlow</h2>
    <p class="login-card__desc">请输入编辑密码</p>
    <div class="login-card__field">
      <input type="password" class="login-card__input" id="loginKey" placeholder="输入编辑密码…" autocomplete="off" onkeydown="if(event.key==='Enter'){event.preventDefault();App.submitLogin()}">
    </div>
    <button class="login-card__btn" onclick="App.submitLogin()">进入</button>
    <p class="login-card__hint">无需密码即可浏览；编辑密码可新建、上传、修改和删除</p>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="loading-bar" id="loadingBar" style="width:0"></div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
